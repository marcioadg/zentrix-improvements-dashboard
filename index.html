<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⚙️ Zentrix Improvements</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #090909; color: #e2e3e5; font-family: Inter, -apple-system, sans-serif; font-size: 13px; min-height: 100vh; }
  header { background: #0f1011; border-bottom: 1px solid #25262b; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 15px; font-weight: 500; }
  .meta { color: #5e5e5f; font-size: 12px; }
  .refresh-btn { color: #5c84fe; cursor: pointer; font-size: 12px; background: none; border: 1px solid #5c84fe44; padding: 4px 10px; border-radius: 4px; }
  .stats { display: flex; gap: 12px; padding: 12px 24px; border-bottom: 1px solid #25262b; flex-wrap: wrap; }
  .stat { background: #191a22; border: 1px solid #25262b; border-radius: 4px; padding: 8px 14px; min-width: 100px; }
  .stat .val { font-size: 20px; font-weight: 600; color: #5c84fe; }
  .stat .lbl { font-size: 11px; color: #5e5e5f; margin-top: 2px; }
  .filters { padding: 10px 24px; background: #0f1011; border-bottom: 1px solid #25262b; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filters label { color: #5e5e5f; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .filter-btn { background: #191a22; border: 1px solid #25262b; color: #96979a; padding: 3px 9px; border-radius: 3px; cursor: pointer; font-size: 11px; }
  .filter-btn:hover { color: #e2e3e5; border-color: #5c84fe55; }
  .filter-btn.active { color: #5c84fe; border-color: #5c84fe; background: #5c84fe11; }
  #search { background: #191a22; border: 1px solid #25262b; color: #e2e3e5; padding: 5px 10px; border-radius: 4px; font-size: 12px; width: 180px; outline: none; }
  #search:focus { border-color: #5c84fe; }
  .entries { padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; }
  .card { background: #191a22; border: 1px solid #25262b; border-radius: 6px; padding: 12px 14px; }
  .card:hover { border-color: #5c84fe33; }
  .card.hidden { display: none; }
  .card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .repo-tag { background: #0f1011; color: #5c84fe; border: 1px solid #5c84fe33; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .cat-tag { padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .score { font-size: 11px; font-weight: 600; margin-left: auto; }
  .time { color: #5e5e5f; font-size: 11px; }
  .card-body { color: #c4c5c7; line-height: 1.5; }
  .empty { color: #5e5e5f; text-align: center; padding: 64px 24px; font-size: 14px; }
  .loading { color: #5e5e5f; text-align: center; padding: 64px; }
  .sep { width: 1px; background: #25262b; height: 18px; }
  .view-toggle { display: flex; gap: 0; }
  .view-btn { color: #96979a; cursor: pointer; font-size: 12px; background: none; border: 1px solid #5c84fe44; padding: 4px 10px; }
  .view-btn:first-child { border-radius: 4px 0 0 4px; }
  .view-btn:last-child { border-radius: 0 4px 4px 0; border-left: none; }
  .view-btn.active { color: #5c84fe; background: #5c84fe11; border-color: #5c84fe; }
  .view-btn.active + .view-btn { border-left: 1px solid #5c84fe; }
  .analytics { padding: 16px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .analytics { grid-template-columns: 1fr; } }
  .chart-card { background: #191a22; border: 1px solid #25262b; border-radius: 6px; padding: 16px; }
  .chart-card h3 { color: #fff; font-size: 13px; font-weight: 500; margin-bottom: 12px; }
  .chart-card canvas { width: 100%; }
</style>
</head>
<body>
<header>
  <h1>⚙️ Zentrix Improvements Dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="meta" id="last-updated">Loading...</span>
    <div class="view-toggle">
      <button class="view-btn active" onclick="switchView('list',this)">List</button>
      <button class="view-btn" onclick="switchView('analytics',this)">Analytics</button>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>
<div class="stats" id="stats"></div>
<div class="filters" id="filters">
  <label>Repo</label>
  <button class="filter-btn active" onclick="setFilter('repo',null,this)">All</button>
  <div class="sep"></div>
  <label>Category</label>
  <button class="filter-btn active" onclick="setFilter('cat',null,this)">All</button>
  <div style="flex:1"></div>
  <input id="search" type="text" placeholder="Search..." oninput="applyFilters()">
</div>
<div class="entries" id="entries"><div class="loading">Loading improvements...</div></div>
<div class="analytics" id="analytics" style="display:none">
  <div class="chart-card"><h3>Improvements Over Time</h3><canvas id="chart-timeline"></canvas></div>
  <div class="chart-card"><h3>Category Breakdown</h3><canvas id="chart-categories"></canvas></div>
  <div class="chart-card"><h3>Repo Activity (Top 10)</h3><canvas id="chart-repos"></canvas></div>
  <div class="chart-card"><h3>Avg Health Score per Repo</h3><canvas id="chart-scores"></canvas></div>
  <div class="chart-card" id="chart-errors-card" style="display:none"><h3>Build Errors by Repo</h3><canvas id="chart-errors"></canvas></div>
</div>

<script>
const CAT_COLORS = {
  'UX/UI':'#5c84fe','Bug Fix':'#f87171','Tests':'#4ade80','Performance':'#fbbf24',
  'Security':'#a78bfa','Dependencies':'#60a5fa','Cleanup':'#96979a','TypeScript':'#34d399','Improvement':'#5e69d1',
  'Build Error':'#f87171'
}
const SCORE_COLOR = s => s>=80?'#4ade80':s>=60?'#fbbf24':'#f87171'

let allEntries = [], activeRepo = null, activeCat = null

async function loadData() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/marcioadg/zentrix-improvements-dashboard/main/data/entries.json?t=' + Date.now())
    allEntries = await r.json()
    render()
    document.getElementById('last-updated').textContent = `${allEntries.length} improvements · updated ${new Date().toLocaleTimeString('en-US', {timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',hour12:true})} EST`
  } catch(e) {
    document.getElementById('entries').innerHTML = '<div class="empty">No data yet — improvements will appear after the next hourly run.</div>'
    document.getElementById('last-updated').textContent = 'No data yet'
  }
}

function render() {
  // Build stats
  const repos = [...new Set(allEntries.map(e=>e.repo))]
  const bugs = allEntries.filter(e=>e.category==='Bug Fix').length
  const ux = allEntries.filter(e=>e.category==='UX/UI').length
  const buildErrors = allEntries.filter(e=>e.category==='Build Error').length
  const days = [...new Set(allEntries.map(e=>e.date))].length
  document.getElementById('stats').innerHTML = [
    {v:allEntries.length,l:'Total'},{v:repos.length,l:'Repos'},{v:days,l:'Days'},{v:bugs,l:'Bugs Fixed'},{v:ux,l:'UX Improvements'},{v:buildErrors,l:'Build Errors',color:'#f87171'}
  ].map(s=>`<div class="stat"><div class="val" ${s.color?`style="color:${s.color}"`:''}>${s.v}</div><div class="lbl">${s.l}</div></div>`).join('')

  // Repo filters
  const repoStats = {}
  allEntries.forEach(e=>{
    if(!repoStats[e.repo]) repoStats[e.repo]={count:0,score:null,name:e.repoName}
    repoStats[e.repo].count++
    if(!repoStats[e.repo].score&&e.score) repoStats[e.repo].score=e.score
  })
  const cats = [...new Set(allEntries.map(e=>e.category))]

  const filtersEl = document.getElementById('filters')
  filtersEl.innerHTML = `
    <label>Repo</label>
    <button class="filter-btn active" onclick="setFilter('repo',null,this)">All</button>
    ${Object.entries(repoStats).map(([r,i])=>`<button class="filter-btn" onclick="setFilter('repo','${r}',this)">${i.name}${i.score?` <span style="color:${SCORE_COLOR(i.score)}">${i.score}</span>`:''}</button>`).join('')}
    <div class="sep"></div>
    <label>Category</label>
    <button class="filter-btn active" onclick="setFilter('cat',null,this)">All</button>
    ${cats.map(c=>`<button class="filter-btn" style="border-color:${CAT_COLORS[c]||'#25262b'}44" onclick="setFilter('cat','${c}',this)">${c}</button>`).join('')}
    <div style="flex:1"></div>
    <input id="search" type="text" placeholder="Search..." oninput="applyFilters()">
  `

  // Cards
  document.getElementById('entries').innerHTML = allEntries.length ? allEntries.map(e=>{
    const isError = e.category === 'Build Error'
    const borderStyle = isError ? 'border-left:3px solid #f87171' : ''
    const catStyle = isError
      ? 'background:#f8717122;color:#f87171;border:1px solid #f8717144'
      : `background:${CAT_COLORS[e.category]||'#5e5e5f'}22;color:${CAT_COLORS[e.category]||'#96979a'};border:1px solid ${CAT_COLORS[e.category]||'#25262b'}44`
    const details = (e.errorDetails && e.errorDetails.length)
      ? `<details style="margin-top:6px;font-size:11px;color:#96979a"><summary style="cursor:pointer;color:#f87171">Error details</summary><pre style="margin-top:4px;white-space:pre-wrap;color:#c4c5c7;font-size:11px;background:#0f1011;padding:8px;border-radius:4px;overflow-x:auto">${e.errorDetails.map(l=>l.replace(/</g,'&lt;')).join('\n')}</pre></details>`
      : ''
    return `<div class="card" data-repo="${e.repo}" data-cat="${e.category}" style="${borderStyle}">
      <div class="card-header">
        <span class="repo-tag">${e.repoName}</span>
        <span class="cat-tag" style="${catStyle}">${e.category}</span>
        ${e.score?`<span class="score" style="color:${SCORE_COLOR(e.score)}">${e.score}/100</span>`:''}
        <span class="time">${e.date} ${e.time} EST</span>
      </div>
      <div class="card-body">${e.summary||'(no summary)'}${details}</div>
    </div>`}).join('') : '<div class="empty">No improvements logged yet.</div>'

  applyFilters()
}

function setFilter(type, val, btn) {
  if(type==='repo') activeRepo=val; else activeCat=val
  document.querySelectorAll(`.filter-btn`).forEach(b=>{ if((type==='repo'&&!b.onclick?.toString().includes("'cat'"))||(type==='cat'&&b.onclick?.toString().includes("'cat'"))) b.classList.remove('active') })
  btn.classList.add('active')
  applyFilters()
}

function applyFilters() {
  const search = (document.getElementById('search')?.value||'').toLowerCase()
  document.querySelectorAll('.card').forEach(c=>{
    const show = (!activeRepo||c.dataset.repo===activeRepo) && (!activeCat||c.dataset.cat===activeCat) && (!search||c.textContent.toLowerCase().includes(search))
    c.classList.toggle('hidden',!show)
  })
}

let currentView = 'list'

function switchView(view, btn) {
  currentView = view
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('entries').style.display = view === 'list' ? 'flex' : 'none'
  document.getElementById('filters').style.display = view === 'list' ? 'flex' : 'none'
  document.getElementById('analytics').style.display = view === 'analytics' ? 'grid' : 'none'
  if (view === 'analytics' && allEntries.length) renderCharts()
}

function renderCharts() {
  drawTimelineChart()
  drawCategoryChart()
  drawRepoChart()
  drawScoreChart()
  drawErrorChart()
}

function setupCanvas(id) {
  const canvas = document.getElementById(id)
  const container = canvas.parentElement
  const dpr = window.devicePixelRatio || 1
  const w = container.clientWidth - 32
  canvas.style.width = w + 'px'
  canvas.width = w * dpr
  const ctx = canvas.getContext('2d')
  ctx.scale(dpr, dpr)
  return { canvas, ctx, w, dpr }
}

function drawTimelineChart() {
  const dateCounts = {}
  allEntries.forEach(e => { dateCounts[e.date] = (dateCounts[e.date] || 0) + 1 })
  const dates = Object.keys(dateCounts).sort()
  const counts = dates.map(d => dateCounts[d])
  const maxVal = Math.max(...counts, 1)

  const barH = 28, gap = 4, padLeft = 80, padRight = 16, padTop = 8, padBottom = 8
  const h = dates.length * (barH + gap) + padTop + padBottom
  const { ctx, w, canvas, dpr } = setupCanvas('chart-timeline')
  canvas.style.height = h + 'px'
  canvas.height = h * dpr
  ctx.scale(dpr, dpr)

  const chartW = w - padLeft - padRight
  dates.forEach((d, i) => {
    const y = padTop + i * (barH + gap)
    const barW = Math.max((counts[i] / maxVal) * chartW, 2)
    ctx.fillStyle = '#5c84fe'
    ctx.fillRect(padLeft, y, barW, barH)
    ctx.fillStyle = '#5e5e5f'
    ctx.font = '11px Inter, sans-serif'
    ctx.textAlign = 'right'
    ctx.textBaseline = 'middle'
    ctx.fillText(d, padLeft - 8, y + barH / 2)
    ctx.fillStyle = '#e2e3e5'
    ctx.textAlign = 'left'
    ctx.fillText(counts[i], padLeft + barW + 6, y + barH / 2)
  })
}

function drawCategoryChart() {
  const catCounts = {}
  allEntries.forEach(e => { catCounts[e.category] = (catCounts[e.category] || 0) + 1 })
  const sorted = Object.entries(catCounts).sort((a, b) => b[1] - a[1])
  const maxVal = Math.max(...sorted.map(s => s[1]), 1)

  const barH = 28, gap = 4, padLeft = 100, padRight = 16, padTop = 8, padBottom = 8
  const h = sorted.length * (barH + gap) + padTop + padBottom
  const { ctx, w, canvas, dpr } = setupCanvas('chart-categories')
  canvas.style.height = h + 'px'
  canvas.height = h * dpr
  ctx.scale(dpr, dpr)

  const chartW = w - padLeft - padRight
  sorted.forEach(([cat, count], i) => {
    const y = padTop + i * (barH + gap)
    const barW = Math.max((count / maxVal) * chartW, 2)
    ctx.fillStyle = CAT_COLORS[cat] || '#5e5e5f'
    ctx.fillRect(padLeft, y, barW, barH)
    ctx.fillStyle = '#5e5e5f'
    ctx.font = '11px Inter, sans-serif'
    ctx.textAlign = 'right'
    ctx.textBaseline = 'middle'
    ctx.fillText(cat, padLeft - 8, y + barH / 2)
    ctx.fillStyle = '#e2e3e5'
    ctx.textAlign = 'left'
    ctx.fillText(count, padLeft + barW + 6, y + barH / 2)
  })
}

function drawRepoChart() {
  const repoCounts = {}
  const repoNames = {}
  allEntries.forEach(e => {
    repoCounts[e.repo] = (repoCounts[e.repo] || 0) + 1
    repoNames[e.repo] = e.repoName
  })
  const sorted = Object.entries(repoCounts).sort((a, b) => b[1] - a[1]).slice(0, 10)
  const maxVal = Math.max(...sorted.map(s => s[1]), 1)

  const barH = 28, gap = 4, padLeft = 140, padRight = 16, padTop = 8, padBottom = 8
  const h = sorted.length * (barH + gap) + padTop + padBottom
  const { ctx, w, canvas, dpr } = setupCanvas('chart-repos')
  canvas.style.height = h + 'px'
  canvas.height = h * dpr
  ctx.scale(dpr, dpr)

  const chartW = w - padLeft - padRight
  sorted.forEach(([repo, count], i) => {
    const y = padTop + i * (barH + gap)
    const barW = Math.max((count / maxVal) * chartW, 2)
    ctx.fillStyle = '#5c84fe'
    ctx.fillRect(padLeft, y, barW, barH)
    ctx.fillStyle = '#5e5e5f'
    ctx.font = '11px Inter, sans-serif'
    ctx.textAlign = 'right'
    ctx.textBaseline = 'middle'
    ctx.fillText(repoNames[repo] || repo, padLeft - 8, y + barH / 2)
    ctx.fillStyle = '#e2e3e5'
    ctx.textAlign = 'left'
    ctx.fillText(count, padLeft + barW + 6, y + barH / 2)
  })
}

function drawScoreChart() {
  const repoScores = {}
  const repoNames = {}
  allEntries.forEach(e => {
    if (e.score) {
      if (!repoScores[e.repo]) repoScores[e.repo] = []
      repoScores[e.repo].push(e.score)
      repoNames[e.repo] = e.repoName
    }
  })
  const avgs = Object.entries(repoScores).map(([repo, scores]) => ({
    repo, name: repoNames[repo] || repo, avg: Math.round(scores.reduce((a, b) => a + b, 0) / scores.length)
  })).sort((a, b) => b.avg - a.avg)

  const barH = 28, gap = 4, padLeft = 140, padRight = 40, padTop = 8, padBottom = 8
  const h = Math.max(avgs.length * (barH + gap) + padTop + padBottom, 60)
  const { ctx, w, canvas, dpr } = setupCanvas('chart-scores')
  canvas.style.height = h + 'px'
  canvas.height = h * dpr
  ctx.scale(dpr, dpr)

  if (!avgs.length) {
    ctx.fillStyle = '#5e5e5f'
    ctx.font = '12px Inter, sans-serif'
    ctx.textAlign = 'center'
    ctx.fillText('No health scores available', w / 2, h / 2)
    return
  }

  const chartW = w - padLeft - padRight
  avgs.forEach(({ name, avg }, i) => {
    const y = padTop + i * (barH + gap)
    const barW = Math.max((avg / 100) * chartW, 2)
    ctx.fillStyle = avg >= 80 ? '#4ade80' : avg >= 60 ? '#fbbf24' : '#f87171'
    ctx.fillRect(padLeft, y, barW, barH)
    ctx.fillStyle = '#5e5e5f'
    ctx.font = '11px Inter, sans-serif'
    ctx.textAlign = 'right'
    ctx.textBaseline = 'middle'
    ctx.fillText(name, padLeft - 8, y + barH / 2)
    ctx.fillStyle = '#e2e3e5'
    ctx.textAlign = 'left'
    ctx.fillText(avg, padLeft + barW + 6, y + barH / 2)
  })
}

function drawErrorChart() {
  const errorEntries = allEntries.filter(e => e.category === 'Build Error')
  const card = document.getElementById('chart-errors-card')
  if (!errorEntries.length) { card.style.display = 'none'; return }
  card.style.display = ''

  const repoCounts = {}
  const repoNames = {}
  errorEntries.forEach(e => {
    repoCounts[e.repo] = (repoCounts[e.repo] || 0) + 1
    repoNames[e.repo] = e.repoName
  })
  const sorted = Object.entries(repoCounts).sort((a, b) => b[1] - a[1])
  const maxVal = Math.max(...sorted.map(s => s[1]), 1)

  const barH = 28, gap = 4, padLeft = 140, padRight = 16, padTop = 8, padBottom = 8
  const h = Math.max(sorted.length * (barH + gap) + padTop + padBottom, 60)
  const { ctx, w, canvas, dpr } = setupCanvas('chart-errors')
  canvas.style.height = h + 'px'
  canvas.height = h * dpr
  ctx.scale(dpr, dpr)

  const chartW = w - padLeft - padRight
  sorted.forEach(([repo, count], i) => {
    const y = padTop + i * (barH + gap)
    const barW = Math.max((count / maxVal) * chartW, 2)
    ctx.fillStyle = '#f87171'
    ctx.fillRect(padLeft, y, barW, barH)
    ctx.fillStyle = '#5e5e5f'
    ctx.font = '11px Inter, sans-serif'
    ctx.textAlign = 'right'
    ctx.textBaseline = 'middle'
    ctx.fillText(repoNames[repo] || repo, padLeft - 8, y + barH / 2)
    ctx.fillStyle = '#e2e3e5'
    ctx.textAlign = 'left'
    ctx.fillText(count, padLeft + barW + 6, y + barH / 2)
  })
}

loadData()
setInterval(loadData, 60000)
</script>
</body>
</html>
